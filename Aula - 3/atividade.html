<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividade - Formulário</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Formulário de Candidatura</h1>
<div class="caixa-inline">
    <section class="container">
      <label for="name">Digite seu nome : </label>
      <input type="text" id="nome" placeholder="digite seu nome" />
      <br />

      <label for="email">Digite seu email</label>
      <input type="text" id="email" placeholder="digite seu email" />
      <br />

      <label for="cargo"> Cargo de Tecnologia </label>
      <select name="cargo" id="cargo">
        <option value="Full">Full</option>
        <option value="Back">Back</option>
        <option value="Front">Front</option>
        <option value="professor">Professor</option>
        <option value="estagiario">Estagiário</option>
        <option value="outro">Outro</option>
      </select>
      <br />

      <label for="sexo" name="Genero" id="Genero" value="Genero"> Genero</label>
      <input type="checkbox" />Masculino
       <input type="checkbox" /> Feminino
      <input type="checkbox" />Outro
      <input type="checkbox" /> Voce que sabe.
      <br />

      <label for="interesse" name="Unidade">Unidade de interesse:</label>
      <input type="checkbox" name="Unidade" id="Fortaleza" value="Fortaleza"/> Fortaleza 
      <input type="checkbox" name="Caucaia" id="Caucaia" value="Caucaia"/> Caucaia
      <input type="checkbox" name="Unidade" id="Eusébio" value="Eusébio" /> Eusébio <br /><br />

      <label for="meuTexto"> Fale mais sobre voce :</label><br />
      <textarea type="message" id="meuTexto" name="meuTexto" rows="5"> Enviar mensagem </textarea
      ><br>

      <input type="submit" value="enviar"/>
    </form>
  </div>
  </body>
</html>
