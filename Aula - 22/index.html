<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <title> Aula - 22 </title>
  </head>
  <body style="margin-bottom: 500px;">

    <h1 class="bg-body-secondary text-center">API</h1>

     <div class="container text-center p-2 m-2">
        <div class="row mt-5">
            <div class="col-12">
                <h1>Faça seu cadastro</h1>
            </div>
            <div class="col-6">
                <div>
                    <label class="p-2" for="nome">Nome: </label>
                    <input type="text" name="nome" id="nome">
                </div>
            </div>
            <div class="col-6">
                <label class="p-2" for="idade">Idade</label>
                <input type="text" name="idade" id="idade">
            </div>

            <div class="col-6">
                <div>
                    <label class="p-2" for="cep">CEP:</label>
                    <input oninput="lognumero()" type="text" name="cep" id="cep">
                </div>
                <div>
                    <label class="p-2" for="cep">Rua:</label>
                    <input type="text" name="rua" id="rua">
                </div>
                <div>
                    <label class="p-2" for="cep">Complemento:</label>
                    <input type="text" name="complemento" id="complemento">
                </div>

                 <div>
                    <label class="p-2" for="cep">Estado:</label>
                    <input type="text" name="estado" id="estado">
                </div>

            </div>
            <div class="col-6">
                <div>
                    <label class="p-2" for="cep">Cidade:</label>
                    <input type="text" name="cidade" id="cidade">
                </div>
                <div>
                    <label class="p-2" for="cep">Estado:</label>
                    <input type="text" name="estado" id="estado">
                </div>
                <div>
                    <label class="p-2" for="cep">Região:</label>
                    <input type="text" name="regiao" id="regiao">
                </div>
            </div>
        </div>
   </div>



<div class="bg-tertiary text-center mt-5 border border-3 p-2">
<h1 class="bg-body-secondary text-center">Buscar Produto Fake Store API</h1>
   <label class="mt-3 p-2" for="number">Numero do produto: </label>
        <input oninput="buscarApi()" type="number" name="number" id="number" placeholder="digite o numero do produto">
</div>

    <script src="index.js"></script>
    <script src="bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
  </body>
</html>
