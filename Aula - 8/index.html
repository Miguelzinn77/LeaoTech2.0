    <h1>Aula - 8 : Introdução ao BOOTSTRAP</h1>

    <button type="button" class="btn btn-primary btn-sm m-5">Small button</button>
    <!-- o "m" na classe vai de 0 a 5 para fazer os espaçamento, t pra cima, s para inicio -->
    <button type="button" class="btn btn-outline-danger m-5">Small button</button>

<!-- na cor em BOOTSTRAP coloca com bg na classe e escolhe a cor, tipo bg-dark, bg-danger etc... -->
    <div class="text-bg-dark p-3">Primary with contrasting color</div>
    <div class="text-bg-danger p-3">Secondary with contrasting color</div>
    <div class="text-bg-info p-3">Info with contrasting color</div>
    <div class="text-bg-light p-3">Light with contrasting color</div>
    <div class="text-bg-warning p-3">Warning with contrasting color</div>

<!-- border, class="rounded" para deixar arredondada -->
 <div style="height: 200px; background-color: red;" class="p-3 m-5 ">
    <!-- d-flex aqui é o display flex no css para centralizar -->
 <div class="p-3 m-5 text-center text-light w-25 h-50 bg-success border border-5 rounded-5 align-items-center justify-content-center d-flex">
75x75
 </div>
</div>
