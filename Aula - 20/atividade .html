<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-4">
    <h2 class="mb-4">Cadastro de Usuários</h2>

    <div class="card p-3 mb-4">

        <!-- NOME -->
      <div class="mb-2">
        <input type="text" id="nome" class="form-control" placeholder="Nome"> <!-- input nome -->
      </div>

        <!-- IDADE -->
      <div class="mb-2">
        <input type="number" id="idade" class="form-control" placeholder="Idade"> <!-- input idade -->
      </div>

      <!-- FOTO -->
      <div class="mb-2">
        <input type="text" id="foto" class="form-control" placeholder="URL da Foto"> <!-- input foto -->
      </div>

      <!-- CPF -->
      <div class="mb-2">
        <input type="text" id="cpf" class="form-control" placeholder="CPF"> <!-- input cpf -->
      </div>

    <!-- FUNÇÕES -->
      <div class="d-flex gap-2">
        <button class="btn btn-success" onclick="cadastrar()">Cadastrar</button>
        <button class="btn btn-primary" onclick="listar()">Listar</button>
        <button class="btn btn-warning" onclick="editar()">Editar</button>
      </div>
    </div>

    <div id="listaUsuarios" class="row"></div> <!-- aqui o card que aparece manipulando na função listar -->
  </div>

<script src="atividade.js"></script>  
</body>
</html>
